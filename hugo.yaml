title: Rosano
baseURL: https://home.rosano.ca/
languageCode: en-ca
pagination:
  pagerSize: 20

titleCaseStyle: none
markup:
  goldmark:
    renderer:
      unsafe: true
      hardWraps: true
    parser:
      autoHeadingIDType: github-ascii
    extensions:
      typographer: false
disableKinds:
- taxonomy

taxonomies:
  category: categories
  tag: tags
  place: place
  country: country
  series: series
  timeline_year: timeline_year
  timeline_month: timeline_month
  timeline_day: timeline_day
  lyrics_collection: lyrics_collection
  lyrics_topic: lyrics_topic

permalinks:
  page:
    vlog: /:sections[last]/:slug/
    timeline: /log/:slugorcontentbasename/
    blog: /:sections[last]/:slug/
  section:
    vlog: /vlog/
    timeline: /log/
    blog: /blog/
  term:
    categories: /log/type/:slug/
    tags: /log/tag/:slug/
    series: /log/series/:slug/
    place: /log/place/:slug/
    country: /log/country/:slug/
    timeline_year: /log/:2006/
    timeline_month: /log/:2006/:01/
    timeline_day: /log/:2006/:01/:02/
    lyrics_collection: /lyrics/:slug/
    lyrics_topic: /lyrics/topic/:slug/

services:
  rss:
    limit: 90

mediaTypes:
  application/rss:
    suffix: ""
    delimiter: ""
  application/rss+xml:
    suffix: ""
    delimiter: ""
outputFormats:
  rss:
    mediatype: "application/rss"
    baseName: "feed"
  json:
    baseName: "data"
  podcast:
    mediatype: "application/rss+xml"
    baseName: "podcast"

outputs:
  section:
  - html
  - rss
  - json

params:
  author: Rosano
  podcast:
    imageURL: https://static.rosano.ca/strolling/podcast.jpg
    enclosure:
      prefix: https://f005.backblazeb2.com/file/rosano/public/sorted/
      audio:
        file: audio.mp3
        type: audio/mpeg
    categories:
      - Society &amp; Culture
      - Arts
    "itunes:explicit": false
    "podcast:funding": https://rosano.ca/back
  sourcePrefix: https://github.com/rosano/home/edit/master
  mediaPrefix: https://static.rosano.ca/home
  _showGazette: true
  logoURL: https://rosano.ca/_shared/__external/ROCORootLink/identity.svg
  touchURL: https://static.rosano.ca/rcreativ/touch.png
  _bannerScriptURL: https://olsk.rosano.ca/OLSKBanner/master/main.js
  _showTemporary: true
  _showTypes: true
  lowerLyricTitles: true
  timelineSources:
    - content-sources/journal
    - content-sources/journal/_archive/2021
    - content-sources/journal/_archive/2022–2024
    - content-sources/journal/_archive/fleeting-arrivals
    - content/vlog/vibrations
    - content/vlog/strolling
    - content/blog
    - content/blog/ephemerata
    - content/now
    - content/occasion
