{{ define "main" }}

<div class="post">

{{ .Content }}

</div>

<hr>

<h3>Archive</h3>

<blog-list>
{{ range .Pages }}
<card>
	<time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{- .Date.Format "Jan 02 2006" -}}</time>
	<article>
		<a href="{{ .RelPermalink }}">{{ .Title }}</a>
		{{ if .Params.Summary }}
			<p>{{ .Summary }}</p>
		{{ end }}
	</article>
</card>
{{ end }}
</blog-list>

{{ end }}
